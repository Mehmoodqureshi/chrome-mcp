name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [18, 20, 22]
        # One Windows job guards against POSIX-only assumptions (the 0600 mode
        # check in bridge/auth.ts, `ps`, .cmd bin shims) regressing for
        # native-Windows users.
        include:
          - os: windows-latest
            node-version: 22
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Typecheck (server)
        run: npm run typecheck

      - name: Typecheck (extension)
        run: npm run typecheck:ext

      - name: Build (server)
        run: npm run build

      - name: Build (extension)
        run: npm run build:ext

      - name: Test
        # The extension smoke test self-skips unless RUN_EXT_SMOKE is set (it
        # needs a headed Chrome), so the default suite runs browser-free in CI.
        run: npm test
